spring:
  datasource:
    url: jdbc:h2:mem:externalingestiondb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false   # H2 does not support jsonb; schema managed by ddl-auto:update
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  sql:
    init:
      mode: never

server:
  port: 8082

# LocalStack SQS 수동 검증 (필요 시 주석 해제):
# ingestion:
#   sqs:
#     enabled: true
#     endpoint-override: http://localhost:4566
#     disaster-cache-queue-url: http://localhost:4566/000000000000/disaster-cache
#     environment-cache-queue-url: http://localhost:4566/000000000000/environment-cache
# LocalStack 큐 생성: aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name disaster-cache
